<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang tải dữ liệu của Ani-BL</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="animation.css">
</head>

<body>

<div class="background-glow"></div>

<main class="loading-container">

    <section class="loading-card">

        <div class="logo">
            <div class="logo-circle"></div>
        </div>

        <p class="subtitle">
            Chào mừng đến với
        </p>

        <h1>
            Ani-BL nền tảng giải trí dành cho người yêu thích BL
        </h1>

        <p id="status">
            Đang tai dữ liệu...
        </p>

        <div class="progress">

            <div id="progressBar"></div>

        </div>

        <div class="bottom">

            <span id="percent">
                0%
            </span>

            <span>
                Đang tải...
            </span>

        </div>

    </section>

</main>

<footer>

    © Ani-BL Nơi cảm súc thăng hoa

</footer>

<script src="animation.js"></script>

</body>
</html>
